<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>My Portfolio</h1>

    <!-- Gallery -->
    <div class="gallery">
        <img src="images/pic1.jpg" onclick="openImage(this)">
        <img src="images/pic2.jpg" onclick="openImage(this)">
        <img src="images/pic3.jpg" onclick="openImage(this)">
    </div>

    <!-- Fullscreen Preview -->
    <div class="preview" id="preview">
        <span onclick="closeImage()">X</span>
        <img id="previewImg">
    </div>

    <!-- Videos -->
    <h2>Videos</h2>
    <video controls>
        <source src="videos/20260329_132211.mp4">
    </video>

    <script src="script.js"></script>

</body>
</html>
